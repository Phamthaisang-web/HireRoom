<!doctype html>
<html>
  <head>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <style>
      body {
        font-family: Arial;
      }
      .container {
        display: flex;
      }

      .users {
        width: 200px;
        border-right: 1px solid #ccc;
        padding: 10px;
      }

      .messages {
        height: 300px;
        overflow-y: auto;
        border: 1px solid #ccc;
        padding: 10px;
      }

      .me {
        text-align: right;
        color: green;
      }
      .other {
        text-align: left;
        color: blue;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- USER LIST (ADMIN) -->
      <div class="users" id="userList"></div>

      <!-- CHAT -->
      <div style="flex: 1; padding: 10px">
        <h3 id="title"></h3>
        <div id="messages" class="messages"></div>
        <input id="messageInput" />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>

    <script>
      const socket = io("http://localhost:8080");

      const user = JSON.parse(localStorage.getItem("user"));

      if (!user) {
        alert("Chưa login");
        location.href = "login.html";
      }

      let currentConversationId = null;
      let receiverId = null;

      // ======================
      // INIT
      // ======================
      async function init() {
        if (user.role === "admin") {
          document.getElementById("title").innerText = "Admin Chat";
          loadUsers();
        } else {
          document.getElementById("title").innerText = "User Chat";

          const res = await fetch(
            "http://localhost:8080/api/chat/conversation",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                userId: user.id,
                staffId: 6, // admin
              }),
            },
          );

          const conv = await res.json();

          currentConversationId = conv.id;
          receiverId = 6;

          socket.emit("joinConversation", currentConversationId);

          loadMessages(currentConversationId);
        }
      }

      init();

      async function loadUsers() {
        const res = await fetch(
          `http://localhost:8080/api/chat/admin/conversations/${user.id}`,
        );
        const list = await res.json();

        const container = document.getElementById("userList");
        container.innerHTML = "";

        list.forEach((item) => {
          const div = document.createElement("div");
          div.innerText = item.fullName;
          div.style.cursor = "pointer";

          div.onclick = () => selectUser(item);

          container.appendChild(div);
        });
      }

      // ======================
      // ADMIN CHỌN USER
      // ======================
      function selectUser(item) {
        currentConversationId = item.conversationId;
        receiverId = item.userId;

        document.getElementById("messages").innerHTML = "";

        socket.emit("joinConversation", currentConversationId);

        loadMessages(currentConversationId);
      }

      // ======================
      // LOAD MESSAGE
      // ======================
      async function loadMessages(id) {
        const res = await fetch(
          `http://localhost:8080/api/chat/messages/${id}`,
        );
        const messages = await res.json();

        messages.forEach(addMessage);
      }

      // ======================
      // RECEIVE
      // ======================
      socket.on("receiveMessage", (msg) => {
        addMessage(msg);
      });

      // ======================
      // UI
      // ======================
      function addMessage(msg) {
        const div = document.createElement("div");

        if (msg.senderId == user.id) {
          div.className = "me";
        } else {
          div.className = "other";
        }

        div.innerText = msg.messageText;
        document.getElementById("messages").appendChild(div);
      }

      // ======================
      // SEND
      // ======================
      function sendMessage() {
        const text = document.getElementById("messageInput").value;

        if (!text) return;

        socket.emit("sendMessage", {
          conversationId: currentConversationId,
          senderId: user.id,
          senderType: user.role === "admin" ? "staff" : "user",
          receiverId,
          receiverType: user.role === "admin" ? "user" : "staff",
          messageText: text,
        });

        document.getElementById("messageInput").value = "";
      }
    </script>
  </body>
</html>
